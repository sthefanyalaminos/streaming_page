<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <header>
            <h1>Quem está assistindo?</h1>
        </header>

        <section class="profiles">

            <article class="profile"> 
                <figure>
                    <img src="assets/perfil1.jpg" alt="Personagem em stop-motion com traços melancólicos e olhos grandes, vestido com um sobretudo remendado e cachecol listrado, em um cenário gótico e sombrio">
                    <figcaption>Sirius</figcaption>
                </figure>
            </article>

            <article class="profile"> 
                <figure>
                    <img src="assets/perfil2.jpg" alt="Personagem de animação stop-motion com estética gótica em um cenário surrealista repleto de portas coloridas, escadarias assimétricas e quadros tortos em paredes roxas e azuis.">
                    <figcaption>Lupin</figcaption>
                </figure>
            </article>

            <article class="profile"> 
                <figure>
                    <img src="assets/perfil3.png" alt="Personagem de animação stop-motion com estética gótica em um cenário surrealista repleto de portas coloridas, escadarias assimétricas e quadros tortos em paredes roxas e azuis.">
                    <figcaption>Narcisa</figcaption>
                </figure>
            </article>

            <article class="profile"> 
                <figure>
                    <img src="assets/perfil4.png" alt="Um personagem de estilo stop-motion melancólico, com olhos grandes e expressivos, vestindo roupas vitorianas em tons de verde e azul em um cenário surrealista repleto de portas e escadas flutuantes.">
                    <figcaption>Lucius</figcaption>
                </figure>
            </article>

        </section>

    </main>
</body>
</html>
